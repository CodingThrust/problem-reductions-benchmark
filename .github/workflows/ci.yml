name: CI — unit tests and verifier calibration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read benchmark version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r benchmark/requirements.txt

      - name: Run unit tests (judgment + non-integration)
        run: pytest -v -m "not integration"

      - name: Check frozen Top50 calibration evidence
        run: make verify-budget

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: intake/cloudflare-worker/package-lock.json

      - name: Install intake Worker dependencies
        working-directory: intake/cloudflare-worker
        run: npm ci

      - name: Test intake Worker
        working-directory: intake/cloudflare-worker
        run: npm test

      - name: Bundle intake Worker
        working-directory: intake/cloudflare-worker
        run: npm run check

      # Calibration needs the real `pred` binary (Rust, built from problem-reductions at
      # PR_REF). The bare runner has no pred, so run it inside the scoring image — the same
      # pinned-pred environment used to score submissions. The image's default CMD is the
      # calibration self-test. GHA cache is shared with score-from-r2.yml.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build scoring image (pred + verifier)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          build-args: PR_REF=${{ steps.version.outputs.value }}
          load: true
          tags: prb-scoring:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run verifier calibration (known-answer fixtures, in-image)
        run: docker run --rm --network none prb-scoring:latest

      - name: Check frozen budget in pinned image
        run: docker run --rm --network none --entrypoint python prb-scoring:latest -m benchmark.calibrate_budget --check benchmark/docs/budget-calibration.json
