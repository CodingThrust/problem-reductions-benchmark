name: Validate, build index, and publish leaderboard

on:
  push:
    branches: [master]
    paths:
      - "results/**.json"
      - "leaderboard/**"
      - "benchmark/build_index.py"
      - "benchmark/validate_results.py"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r benchmark/requirements.txt

      - name: Validate results files (schema gate)
        run: python -m benchmark.validate_results --results-dir results

      - name: Rebuild index
        run: python -m benchmark.build_index --results-dir results

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: [validate-and-build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
