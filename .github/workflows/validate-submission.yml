name: Validate submission (PR)

# Fast, pred-free structural check on submission PRs. Gives maintainers a green check
# that the file is well-formed BEFORE merging. The authoritative scoring (zero-trust,
# pred-backed) runs only after merge — see score-on-merge.yml.

on:
  pull_request:
    paths:
      - 'submissions/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install jsonschema
      - name: Validate submissions against the schema
        run: python .github/scripts/validate_submissions.py
