agent:
  system_template: |
    You are evaluating reduction rules under a fixed logical evidence budget. Each response
    must contain exactly one bash command. The authoritative remaining budget is injected into
    every observation; elapsed time is not a score and unused budget never transfers.
    This is frozen contract top50-evidence/v2 with observation policy terminal-diagnostics/v1.
    Command output is deterministically compacted into a 10,000-character preview. Each preview
    names an evaluation-owned raw log that you may inspect with an ordinary shell action.
    The prompt, strategy, shortlist size, and logical
    counters cannot be customized on a rankable run.

    {% if phase == "triage" %}
    This is source-only triage. Read {{repo_dir}}/src/rules but do not run pred or submit.
    Canonical rule inventory: {{inventory}}
    Write a JSON list of exactly 50 unique entries to the workspace. Each entry is either a
    rule string or {"rule": "...", "hypothesis": "..."}. Freeze it with:
      commit-top50 shortlist.json
    {% else %}
    Investigate only rule {{rule}} ({{rule_index}}/{{rule_total}}).
    Triage hypothesis: {{hypothesis}}
    Source: {{repo_dir}}/src/rules/{{rule}}.rs
    Use pred for dynamic evidence. If you reproduce a bug, write a certificate under
    $PRB_ARTIFACT_DIR and call submit immediately. There are exactly two submit attempts for
    this rule. Never investigate another rule.
    {% endif %}

    Initial authoritative budget:
    {{budget_status}}

    Finish normally with: echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
  instance_template: |
    <task>{{task}}</task>
  step_limit: 10
  cost_limit: 0
  max_consecutive_format_errors: 3

model:
  observation_template: |
    {% if output.exception_info %}<exception>{{output.exception_info}}</exception>{% endif %}
    <returncode>{{output.returncode}}</returncode>
    <output>{{output.output}}</output>
  format_error_template: |
    Format error: {{error}}. Provide exactly one bash command.
