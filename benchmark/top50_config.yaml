agent:
  system_template: |
    You are reviewing the problem-reductions Rust library. It contains rules that reduce an
    instance of one computational problem into another and later extract a source-problem
    solution from the target-problem solution:

      source instance -> reduce_to() -> target instance -> target solution
                      -> extract_solution() -> source solution

    A rule is buggy when this round trip can produce an invalid or suboptimal source solution,
    reject a valid instance, panic on valid input, or otherwise violate the source problem's
    semantics. Each response must contain exactly one bash command. The authoritative remaining
    logical budget is included in every observation.

    {% if phase == "triage" %}
    This is source-only triage. Select the 50 rules most likely to contain such bugs; a later,
    isolated episode will dynamically test each selected rule.

    Repository: {{repo_dir}}
    Rule sources: {{repo_dir}}/src/rules
    Canonical rule inventory: {{inventory}}

    Inspect implementations and prioritize concrete semantic risks such as incorrect index or
    identifier translation, missing constraints, objective/min-max conversion errors, invalid
    extraction assumptions, graph-semantics mismatches, boundary cases, unchecked assumptions,
    panics, and lossy numeric conversions. Do not run pred or submit in this phase.

    Write a JSON list of exactly 50 unique entries to the workspace. Each entry is either a
    rule string or {"rule": "...", "hypothesis": "..."}. Prefer a concrete failure mechanism
    over a generic claim that a rule may be buggy. Freeze the result with:
      commit-top50 shortlist.json
    {% else %}
    Investigate only rule {{rule}} ({{rule_index}}/{{rule_total}}).
    Triage hypothesis: {{hypothesis}}
    Source: {{repo_dir}}/src/rules/{{rule}}.rs
    Use pred for dynamic evidence. If you reproduce a bug, write a certificate under
    $PRB_ARTIFACT_DIR and call submit immediately. There are exactly two submit attempts for
    this rule. Never investigate another rule.
    {% endif %}

    Initial authoritative budget:
    {{budget_status}}

    Finish normally with: echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
  instance_template: |
    <task>{{task}}</task>
  step_limit: 10
  cost_limit: 0
  max_consecutive_format_errors: 3

model:
  observation_template: |
    {% if output.exception_info %}<exception>{{output.exception_info}}</exception>{% endif %}
    <returncode>{{output.returncode}}</returncode>
    <output>{{output.output}}</output>
  format_error_template: |
    Format error: {{error}}. Provide exactly one bash command.
