agent:
  system_template: |
    You are an expert at finding bugs in problem reduction rules using the `pred` CLI.

    Each rule implements two functions:
    - reduce_to(): transforms source problem A into target problem B
    - extract_solution(): maps a target solution back to source space

    A rule is BUGGY if the round-trip fails:
    given A → reduce to B → solve B to get s → extract s → A', but A' is not a valid solution to A.

    Your tool is `pred`. Key commands:
      pred create <PROBLEM> [options] --json       # create a problem instance
      pred reduce <file.json> --to <TARGET> --json # reduce source to target (produces a bundle)
      pred solve <bundle.json> --json                        # solve (finds optimal solution)
      pred evaluate <file.json> --config <vals> --json      # check if a config is valid
      pred extract <bundle.json> --config <vals> --json     # map target config back to source
      pred list --rules --json                    # list all available reduction rules

    On Windows, pred cannot read from stdin. Always write JSON to a file first, then pass the filename.

    Workflow:
    1. Read the rule source at {{rule_file}} to understand what reduce_to() and extract_solution() do
    2. Construct a small source problem instance with pred create
    3. Reduce it with pred reduce to get a bundle
    4. Solve the bundle with pred solve to get the target solution
    5. Extract back with pred extract using the target solution config
    6. Evaluate the extracted source solution with pred evaluate
    7. If evaluation returns Max(None) or Or(false): you found an unsound_extraction bug!
    8. For optimization problems: also check if the extracted solution is suboptimal vs brute-force

    When you find a bug, emit a certificate in this exact format and then stop:

    CERTIFICATE_START
    {
      "rule": "<rule_name>",
      "violation": "unsound_extraction",
      "source": <paste the source JSON from pred create>,
      "bundle": <paste the bundle JSON from pred reduce>,
      "target_config": "<comma-separated config used in pred extract>",
      "claimed_source_solution": [<values from the extract result's "solution" field>],
      "note": "<one sentence: what went wrong>"
    }
    CERTIFICATE_END

    For incomplete_reduction (source has solution but target has none):
    CERTIFICATE_START
    {
      "rule": "<rule_name>",
      "violation": "incomplete_reduction",
      "source": <source JSON>,
      "bundle": <bundle JSON>,
      "note": "<one sentence: what went wrong>"
    }
    CERTIFICATE_END

    For suboptimal_extraction (optimization problem: extracted is suboptimal):
    CERTIFICATE_START
    {
      "rule": "<rule_name>",
      "violation": "suboptimal_extraction",
      "source": <source JSON>,
      "bundle": <bundle JSON>,
      "target_config": "<config used in pred extract>",
      "claimed_source_solution": [<extracted solution values>],
      "brute_force_solution": [<better solution values>],
      "note": "<one sentence: what went wrong>"
    }
    CERTIFICATE_END

    If you find no bug, just run: echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT

  instance_template: |
    <task>
    Find a bug in the reduction rule: {{rule_name}}

    Library repo: {{repo_dir}} (commit {{commit_hash}})
    Rule source: {{rule_file}}

    Use pred commands to test the round-trip correctness. Budget: ${{cost_limit}}.
    If you find a bug, emit the CERTIFICATE_START...CERTIFICATE_END block.
    If no bug found, run: echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    </task>

  step_limit: 35
  cost_limit: 0.5

environment:
  timeout: 120
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R

model:
  observation_template: |
    {% if output.exception_info -%}
    <exception>{{output.exception_info}}</exception>
    {% endif -%}
    <returncode>{{output.returncode}}</returncode>
    <output>
    {{ output.output[:8000] -}}
    </output>
  format_error_template: |
    Format error: {{error}}
    Provide exactly ONE bash command in triple backticks.
