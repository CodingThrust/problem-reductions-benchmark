name = "intake"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Private R2 bucket that holds raw submissions (the answer key). Create it first:
#   wrangler r2 bucket create prb-submissions
[[r2_buckets]]
binding = "SUBMISSIONS"
bucket_name = "prb-submissions"

# Repo to trigger for scoring (event-driven). Non-secret.
[vars]
GH_DISPATCH_REPO = "CodingThrust/problem-reductions-benchmark"

# Secrets (NOT stored here):
#   wrangler secret put PRB_API_KEY        # bearer token `prb submit` sends
#   wrangler secret put GH_DISPATCH_TOKEN  # fine-grained PAT, Contents: write on the repo
#                                          #   → lets the Worker fire repository_dispatch
#                                          #     (score-from-r2 then waits for your approval)
